name: Fix afternoon agenda layout

on:
  push:
    branches:
      - fix/agenda-afternoon-slot-layout
    paths:
      - .github/scripts/fix_afternoon_layout.py
      - .github/workflows/fix-afternoon-layout.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/agenda-afternoon-slot-layout
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply layout fix
        run: python .github/scripts/fix_afternoon_layout.py
      - name: Commit layout fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/AgendaScreen.tsx
          git diff --cached --quiet || git commit -m "Fix first afternoon appointment layout"
          git push
