name: Apply agenda half-day integration

on:
  push:
    branches:
      - agent/integrate-half-days-classic-agenda

permissions:
  contents: write

jobs:
  patch-agenda:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply integration patch
        run: node scripts/patch-agenda-half-days.cjs

      - name: Install dependencies
        run: npm ci

      - name: Type-check application
        run: npm run typecheck

      - name: Remove one-time patch files
        run: |
          rm -f scripts/patch-agenda-half-days.cjs
          rm -f .github/workflows/apply-agenda-half-day-integration.yml

      - name: Commit integrated agenda
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate van half-days into classic agenda"
          git push
