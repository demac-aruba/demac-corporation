name: Fix agenda team integration compile

on:
  push:
    branches:
      - fix/agenda-team-integration
    paths:
      - .github/scripts/fix_agenda_team_compile.py
      - .github/workflows/fix-agenda-team-compile.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/agenda-team-integration
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply compile fix
        run: python .github/scripts/fix_agenda_team_compile.py
      - name: Commit compile fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/AgendaScreen.tsx
          git diff --cached --quiet || git commit -m "Fix agenda team integration initialization"
          git push
