name: Apply half-days to feature branch once

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/half-days-clean-aug1'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: agent/half-days-clean-aug1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Repair one-time migration syntax
        run: node scripts/fix-halfday-migration-syntax.cjs

      - name: Apply direct TypeScript changes
        run: |
          set +e
          node scripts/apply-half-days-clean.cjs > halfday-patch.log 2>&1
          status=$?
          cat halfday-patch.log
          if [ $status -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add halfday-patch.log
            git commit -m "Record half-day integration diagnostic"
            git push origin HEAD:agent/half-days-clean-aug1
            exit $status
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate TypeScript
        run: npm run typecheck

      - name: Validate web build
        run: npm run build:web

      - name: Remove temporary files from feature branch
        run: |
          rm -rf dist
          rm -f halfday-patch.log
          rm -f halfday-trigger.txt
          rm -f scripts/apply-half-days-clean.cjs
          rm -f scripts/fix-halfday-migration-syntax.cjs
          rm -f .github/workflows/apply-half-days-clean.yml

      - name: Commit validated source to feature branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate van half-days into classic agenda from August 1"
          git push origin HEAD:agent/half-days-clean-aug1
