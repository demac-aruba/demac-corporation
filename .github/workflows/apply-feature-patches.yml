name: Apply and validate feature patches

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: startsWith(github.head_ref, 'feature/client-lifecycle') || startsWith(github.head_ref, 'feature/aruba-location')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply feature patch
        run: |
          if [ -f scripts/apply_feature.py ]; then
            python3 scripts/apply_feature.py
          else
            echo "Feature patch already applied."
          fi
      - run: npm ci
      - id: typecheck
        name: Typecheck
        continue-on-error: true
        run: |
          set +e
          npm run typecheck 2>&1 | tee validation-typecheck.log
          code=${PIPESTATUS[0]}
          if [ "$code" -eq 0 ]; then rm -f validation-typecheck.log; fi
          exit "$code"
      - id: build
        name: Build web
        if: steps.typecheck.outcome == 'success'
        continue-on-error: true
        run: |
          set +e
          npm run build:web 2>&1 | tee validation-build.log
          code=${PIPESTATUS[0]}
          if [ "$code" -eq 0 ]; then rm -f validation-build.log; fi
          exit "$code"
      - name: Commit source and diagnostics
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f scripts/apply_feature.py
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "Apply feature implementation and validation diagnostics"
          git push origin HEAD:${{ github.head_ref }}
      - name: Fail when validation failed
        if: steps.typecheck.outcome == 'failure' || steps.build.outcome == 'failure'
        run: exit 1
