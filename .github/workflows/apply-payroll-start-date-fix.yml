name: Apply payroll start-date and payable fix

on:
  push:
    branches:
      - agent/payroll-start-date-and-payable-fix

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/applyPayrollStartingDateFix.cjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types.ts src/payroll/types.ts src/hooks/usePayrollModule.ts src/components/EmployeeProfileEditor.tsx src/screens/EmployeesTimesheetScreen.tsx src/services/payrollPdf.ts
          git commit -m "Fix payroll payable hours and employee start dates" || exit 0
          git push
