name: Apply appointment change history

on:
  push:
    branches:
      - feature/appointment-change-history

permissions:
  contents: write

jobs:
  patch-validate-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Implement cancellation and rescheduling history
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f'{label} not found')
              return text.replace(old, new, 1)

          # ---- Types -------------------------------------------------------
          types_path = Path('src/types.ts')
          types = types_path.read_text()
          old_history = """export interface WorkOrderScheduleHistoryEntry {
            id: string;
            date: string;
            time: string;
            vanId: string;
            technicianIds: string[];
            scheduledSlots: number;
            status: 'Cancelada' | 'Reprogramada';
            clientId: string;
            propertyId?: string;
            address: string;
            zone?: string;
            problem: string;
            recordedAt: string;
          }"""
          new_history = """export type AppointmentChangeOrigin = 'Cliente' | 'DEMAC' | 'Fuerza mayor' | 'Otro';

          export type AppointmentChangeReasonCategory =
            | 'Cliente solicita otra fecha'
            | 'Cliente no puede recibirnos'
            | 'Cliente ya no desea el servicio'
            | 'No se logró contactar al cliente'
            | 'Problema de precio o cotización'
            | 'Dirección o acceso no disponible'
            | 'Error de programación'
            | 'Falta de personal de DEMAC'
            | 'Avería de van o herramientas'
            | 'Condiciones climáticas'
            | 'Otro';

          export interface WorkOrderScheduleHistoryEntry {
            id: string;
            date: string;
            time: string;
            vanId: string;
            technicianIds: string[];
            scheduledSlots: number;
            status: 'Cancelada' | 'Reprogramada';
            clientId: string;
            propertyId?: string;
            address: string;
            zone?: string;
            problem: string;
            changeOrigin?: AppointmentChangeOrigin;
            reasonCategory?: AppointmentChangeReasonCategory;
            reasonNote?: string;
            changedByUserId?: string;
            changedByName?: string;
            noticeHours?: number;
            newDate?: string;
            newTime?: string;
            newVanId?: string;
            recordedAt: string;
          }"""
          types = replace_once(types, old_history, new_history, 'work order history interface')
          types_path.write_text(types)

          # ---- Agenda ------------------------------------------------------
          agenda_path = Path('src/screens/AgendaScreen.tsx')
          agenda = agenda_path.read_text()

          old_import = "import { AppointmentStatus, Client, DailyVanAssignment, Property, PropertyType, ServiceType, StaffAbsence, StaffProfile, Van, WorkOrder, WorkOrderScheduleHistoryEntry } from '../types';"
          new_import = "import { AppointmentChangeOrigin, AppointmentChangeReasonCategory, AppointmentStatus, Client, DailyVanAssignment, Property, PropertyType, ServiceType, StaffAbsence, StaffProfile, Van, WorkOrder, WorkOrderScheduleHistoryEntry } from '../types';"
          agenda = replace_once(agenda, old_import, new_import, 'Agenda type import')

          constants_anchor = "const propertyTypes: PropertyType[] = ['Casa', 'Apartamento', 'Oficina', 'Local comercial', 'Otro'];"
          constants = """const propertyTypes: PropertyType[] = ['Casa', 'Apartamento', 'Oficina', 'Local comercial', 'Otro'];
          const appointmentChangeOrigins: AppointmentChangeOrigin[] = ['Cliente', 'DEMAC', 'Fuerza mayor', 'Otro'];
          const appointmentChangeReasons: AppointmentChangeReasonCategory[] = [
            'Cliente solicita otra fecha',
            'Cliente no puede recibirnos',
            'Cliente ya no desea el servicio',
            'No se logró contactar al cliente',
            'Problema de precio o cotización',
            'Dirección o acceso no disponible',
            'Error de programación',
            'Falta de personal de DEMAC',
            'Avería de van o herramientas',
            'Condiciones climáticas',
            'Otro',
          ];

          type AppointmentChangeDraft = {
            origin: AppointmentChangeOrigin;
            reasonCategory: AppointmentChangeReasonCategory;
            reasonNote: string;
            changedByUserId?: string;
            changedByName: string;
            recordedAt: string;
            noticeHours: number;
          };"""
          agenda = replace_once(agenda, constants_anchor, constants, 'Agenda change constants')

          agenda = replace_once(agenda, "    workOrders,\n    clients,", "    currentUser,\n    workOrders,\n    clients,", 'current user destructuring')

          start = agenda.index('function scheduleHistoryEntry(')
          end = agenda.index('\n\nfunction toneForStatus', start)
          new_helper = """function scheduleHistoryEntry(
            order: WorkOrder,
            services: ServiceType[],
            details: AppointmentChangeDraft & {
              status: 'Cancelada' | 'Reprogramada';
              newDate?: string;
              newTime?: string;
              newVanId?: string;
            },
          ): WorkOrderScheduleHistoryEntry {
            return {
              id: `history-${order.id}-${Date.now()}`,
              date: order.date,
              time: order.time,
              vanId: order.vanId,
              technicianIds: order.technicianIds,
              scheduledSlots: orderSlotCount(order, services),
              status: details.status,
              clientId: order.clientId,
              propertyId: order.propertyId,
              address: order.address,
              zone: order.zone,
              problem: order.problem,
              changeOrigin: details.origin,
              reasonCategory: details.reasonCategory,
              reasonNote: details.reasonNote,
              changedByUserId: details.changedByUserId,
              changedByName: details.changedByName,
              noticeHours: details.noticeHours,
              newDate: details.newDate,
              newTime: details.newTime,
              newVanId: details.newVanId,
              recordedAt: details.recordedAt,
            };
          }

          function appointmentNoticeHours(order: WorkOrder) {
            const appointment = new Date(`${order.date}T${normalizeTime(order.time)}:00`);
            if (Number.isNaN(appointment.getTime())) return 0;
            return Math.round(((appointment.getTime() - Date.now()) / 3_600_000) * 10) / 10;
          }"""
          agenda = agenda[:start] + new_helper + agenda[end:]

          states_anchor = "  const [formMessage, setFormMessage] = useState('');"
          states = """  const [formMessage, setFormMessage] = useState('');
            const [showChangeReason, setShowChangeReason] = useState(false);
            const [changeAction, setChangeAction] = useState<'cancel' | 'reschedule' | null>(null);
            const [changeOrderId, setChangeOrderId] = useState<string | null>(null);
            const [changeOrigin, setChangeOrigin] = useState<AppointmentChangeOrigin>('Cliente');
            const [changeReasonCategory, setChangeReasonCategory] = useState<AppointmentChangeReasonCategory | ''>('');
            const [changeReasonNote, setChangeReasonNote] = useState('');
            const [changeReasonMessage, setChangeReasonMessage] = useState('');
            const [pendingChangeReason, setPendingChangeReason] = useState<AppointmentChangeDraft | null>(null);"""
          agenda = replace_once(agenda, states_anchor, states, 'Agenda reason states')

          editing_guard_old = """      const scheduleChanged = editingOrder.date !== selectedDate
                || normalizeTime(editingOrder.time) !== time
                || resolveStoredVanId(editingOrder.vanId, agendaVans, legacyVans) !== vanId
                || orderSlotCount(editingOrder, services) !== workHours;
              const result = await updateWorkOrder(editingOrder.id, {"""
          editing_guard_new = """      const scheduleChanged = editingOrder.date !== selectedDate
                || normalizeTime(editingOrder.time) !== time
                || resolveStoredVanId(editingOrder.vanId, agendaVans, legacyVans) !== vanId
                || orderSlotCount(editingOrder, services) !== workHours;
              if (scheduleChanged) {
                setSaving(false);
                return setFormMessage('Para cambiar fecha, van, horario o duración utiliza “Reprogramar cita”, porque ese flujo exige registrar el motivo.');
              }
              const result = await updateWorkOrder(editingOrder.id, {"""
          agenda = replace_once(agenda, editing_guard_old, editing_guard_new, 'edit schedule guard')

          old_edit_history = """        scheduleHistory: scheduleChanged
                  ? [...(editingOrder.scheduleHistory ?? []), scheduleHistoryEntry(editingOrder, services)]
                  : editingOrder.scheduleHistory,"""
          agenda = replace_once(agenda, old_edit_history, "        scheduleHistory: editingOrder.scheduleHistory,", 'edit schedule history')

          old_reschedule_history = "      const history = scheduleHistoryEntry(reschedulingOrder, services);"
          new_reschedule_history = """      if (!pendingChangeReason) {
                setSaving(false);
                return setFormMessage('Registra el motivo de la reprogramación antes de guardar el nuevo horario.');
              }
              const history = scheduleHistoryEntry(reschedulingOrder, services, {
                ...pendingChangeReason,
                status: 'Reprogramada',
                newDate: selectedDate,
                newTime: time,
                newVanId: vanId,
              });"""
          agenda = replace_once(agenda, old_reschedule_history, new_reschedule_history, 'reschedule history creation')
          agenda = replace_once(agenda, "      setReschedulingOrderId(null);\n    } else {", "      setReschedulingOrderId(null);\n      setPendingChangeReason(null);\n    } else {", 'clear reprogram reason after save')

          cancel_start = agenda.index('  const cancelAppointment = async (order: WorkOrder) => {')
          cancel_end = agenda.index('\n\n  const startEdit', cancel_start)
          reason_handlers = """  const openAppointmentChangeReason = (order: WorkOrder, action: 'cancel' | 'reschedule') => {
            setChangeOrderId(order.id);
            setChangeAction(action);
            setChangeOrigin('Cliente');
            setChangeReasonCategory('');
            setChangeReasonNote('');
            setChangeReasonMessage('');
            setShowChangeReason(true);
          };

          const confirmAppointmentChangeReason = async () => {
            const order = workOrders.find((item) => item.id === changeOrderId);
            if (!order || !changeAction) return setChangeReasonMessage('No se encontró la cita seleccionada.');
            if (!changeReasonCategory) return setChangeReasonMessage('Selecciona el motivo principal.');
            if (changeReasonNote.trim().length < 5) return setChangeReasonMessage('Escribe una explicación breve del motivo del cambio.');

            const now = new Date().toISOString();
            const draft: AppointmentChangeDraft = {
              origin: changeOrigin,
              reasonCategory: changeReasonCategory,
              reasonNote: changeReasonNote.trim(),
              changedByUserId: currentUser?.id,
              changedByName: currentUser?.name ?? 'Usuario DEMAC',
              recordedAt: now,
              noticeHours: appointmentNoticeHours(order),
            };

            if (changeAction === 'cancel') {
              setSaving(true);
              const history = scheduleHistoryEntry(order, services, { ...draft, status: 'Cancelada' });
              const result = await updateWorkOrder(order.id, {
                status: 'Cancelada',
                whatsappNotificationsEnabled: false,
                cancelledAt: now,
                cancellationReason: `${changeReasonCategory}: ${changeReasonNote.trim()}`,
                scheduleHistory: [...(order.scheduleHistory ?? []), history],
                updatedAt: now,
              });
              setSaving(false);
              if (!result.ok) return setChangeReasonMessage(result.message ?? 'No se pudo cancelar la cita.');
              if (selectedOrderId === order.id) setSelectedOrderId(null);
              setShowChangeReason(false);
              setChangeOrderId(null);
              setChangeAction(null);
              return;
            }

            setPendingChangeReason(draft);
            setEditingOrderId(null);
            setReschedulingOrderId(order.id);
            setSelectedDate(order.date);
            setCalendarMonth(monthStart(order.date));
            setClientId(order.clientId);
            setPropertyId(order.propertyId ?? '');
            setWorkDescriptionText(order.problem);
            setWorkHours(orderSlotCount(order, services));
            setVanId(resolveStoredVanId(order.vanId, agendaVans, legacyVans));
            setTime(normalizeTime(order.time));
            setSendWhatsApp(order.whatsappNotificationsEnabled !== false);
            setFormMessage('');
            setSuccessMessage('');
            setShowQuickClient(false);
            setShowChangeReason(false);
            setShowCreate(true);
          };

          const cancelAppointment = (order: WorkOrder) => openAppointmentChangeReason(order, 'cancel');"""
          agenda = agenda[:cancel_start] + reason_handlers + agenda[cancel_end:]

          old_start_reschedule_start = agenda.index('  const startReschedule = (order: WorkOrder) => {')
          old_start_reschedule_end = agenda.index('\n\n  return (', old_start_reschedule_start)
          new_start_reschedule = """  const startReschedule = (order: WorkOrder) => openAppointmentChangeReason(order, 'reschedule');"""
          agenda = agenda[:old_start_reschedule_start] + new_start_reschedule + agenda[old_start_reschedule_end:]

          agenda = replace_once(
              agenda,
              "            setReschedulingOrderId(null);\n          }",
              "            setReschedulingOrderId(null);\n            setPendingChangeReason(null);\n          }",
              'appointment modal close cleanup',
          )
          agenda = replace_once(
              agenda,
              "<Button variant=\"secondary\" label=\"Cancelar\" disabled={saving} onPress={() => { setShowCreate(false); setEditingOrderId(null); setReschedulingOrderId(null); }} />",
              "<Button variant=\"secondary\" label=\"Cancelar\" disabled={saving} onPress={() => { setShowCreate(false); setEditingOrderId(null); setReschedulingOrderId(null); setPendingChangeReason(null); }} />",
              'appointment modal cancel cleanup',
          )

          modal_anchor = """      </AppModal>
            </ScrollView>"""
          reason_modal = """      </AppModal>

            <AppModal
              visible={showChangeReason}
              title={changeAction === 'reschedule' ? 'Motivo de la reprogramación' : 'Motivo de la cancelación'}
              onClose={() => {
                if (saving) return;
                setShowChangeReason(false);
                setChangeOrderId(null);
                setChangeAction(null);
                setChangeReasonMessage('');
              }}
            >
              <ScrollView>
                <Text style={styles.modalIntro}>Este registro es obligatorio y quedará visible en el historial del cliente para fines operativos y de auditoría.</Text>
                {changeReasonMessage ? <View style={styles.formError}><Text style={styles.formErrorText}>{changeReasonMessage}</Text></View> : null}

                <Text style={styles.fieldLabel}>Quién originó el cambio</Text>
                <View style={styles.optionWrap}>{appointmentChangeOrigins.map((origin) => <Option key={origin} label={origin} active={changeOrigin === origin} onPress={() => setChangeOrigin(origin)} />)}</View>

                <Text style={styles.fieldLabel}>Motivo principal</Text>
                <View style={styles.optionWrap}>{appointmentChangeReasons.map((reason) => <Option key={reason} label={reason} active={changeReasonCategory === reason} onPress={() => setChangeReasonCategory(reason)} />)}</View>

                <Input
                  label="Explicación del operador"
                  value={changeReasonNote}
                  onChangeText={setChangeReasonNote}
                  multiline
                  placeholder="Ej. La clienta solicitó mover la cita porque el encargado de la propiedad no estará presente."
                />

                <View style={styles.modalActions}>
                  <Button variant="secondary" label="Volver" disabled={saving} onPress={() => { setShowChangeReason(false); setChangeOrderId(null); setChangeAction(null); }} />
                  <Button
                    variant={changeAction === 'cancel' ? 'danger' : 'primary'}
                    label={saving ? 'Guardando…' : changeAction === 'reschedule' ? 'Continuar a reprogramar' : 'Confirmar cancelación'}
                    disabled={saving}
                    onPress={() => void confirmAppointmentChangeReason()}
                  />
                </View>
              </ScrollView>
            </AppModal>
          </ScrollView>"""
          agenda = replace_once(agenda, modal_anchor, reason_modal, 'change reason modal')
          agenda_path.write_text(agenda)

          # ---- Client history ---------------------------------------------
          clients_path = Path('src/screens/ClientsScreen.tsx')
          clients = clients_path.read_text()

          orders_anchor = "  const clientOrders = workOrders.filter((item) => item.clientId === selectedId);"
          orders_replacement = """  const clientOrders = workOrders.filter((item) => item.clientId === selectedId);
            const appointmentChanges = clientOrders
              .flatMap((order) => (order.scheduleHistory ?? []).map((entry) => ({ order, entry })))
              .sort((a, b) => b.entry.recordedAt.localeCompare(a.entry.recordedAt));"""
          clients = replace_once(clients, orders_anchor, orders_replacement, 'client appointment changes')

          history_anchor = """              <Card>
                          <SectionTitle title={`Historial de trabajos (${clientOrders.length})`} />"""
          history_cards = """              <Card>
                          <SectionTitle
                            title={`Historial de citas canceladas o reprogramadas (${appointmentChanges.length})`}
                            subtitle="Incluye motivo, explicación, responsable y anticipación del cambio."
                          />
                          {appointmentChanges.length ? appointmentChanges.map(({ order, entry }) => {
                            const property = properties.find((item) => item.id === entry.propertyId);
                            const notice = typeof entry.noticeHours === 'number'
                              ? entry.noticeHours >= 0 ? `${entry.noticeHours} h de anticipación` : `${Math.abs(entry.noticeHours)} h después de la hora programada`
                              : 'Anticipación no registrada';
                            return (
                              <View key={`${order.id}-${entry.id}`} style={styles.changeHistoryRow}>
                                <View style={{ flex: 1 }}>
                                  <View style={styles.changeHistoryHeader}>
                                    <Text style={styles.changeHistoryTitle}>{entry.status} · {entry.date} · {entry.time}</Text>
                                    <Pill label={entry.status} tone="danger" />
                                  </View>
                                  <Text style={styles.changeHistoryProperty}>{property?.name ?? entry.address} · {order.id}</Text>
                                  <Text style={styles.changeHistoryReason}>Motivo: {entry.reasonCategory ?? 'Motivo no registrado (evento anterior)'}</Text>
                                  {entry.reasonNote ? <Text style={styles.changeHistoryNote}>{entry.reasonNote}</Text> : null}
                                  <Text style={styles.changeHistoryMeta}>Origen: {entry.changeOrigin ?? 'No registrado'} · Registrado por: {entry.changedByName ?? 'No registrado'} · {notice}</Text>
                                  {entry.status === 'Reprogramada' && entry.newDate ? <Text style={styles.changeHistoryNewDate}>Nueva cita: {entry.newDate} · {entry.newTime ?? ''}</Text> : null}
                                </View>
                              </View>
                            );
                          }) : <EmptyState icon="🗓️" title="Sin cancelaciones ni reprogramaciones" message="Los cambios futuros aparecerán aquí con su motivo y responsable." />}
                        </Card>

                        <Card>
                          <SectionTitle title={`Historial de trabajos (${clientOrders.length})`} />"""
          clients = replace_once(clients, history_anchor, history_cards, 'client history card')

          style_anchor = "  historyProblem: { color: colors.muted, fontSize: 10, marginTop: 3 },"
          style_replacement = """  historyProblem: { color: colors.muted, fontSize: 10, marginTop: 3 },
            changeHistoryRow: { paddingVertical: 13, borderBottomWidth: 1, borderBottomColor: '#EDF1F6' },
            changeHistoryHeader: { flexDirection: 'row', alignItems: 'center', justifyContent: 'space-between', gap: 10 },
            changeHistoryTitle: { color: colors.text, fontWeight: '900', fontSize: 12 },
            changeHistoryProperty: { color: colors.primaryDark, fontSize: 10, fontWeight: '800', marginTop: 5 },
            changeHistoryReason: { color: colors.text, fontSize: 11, fontWeight: '800', marginTop: 7 },
            changeHistoryNote: { color: colors.text, fontSize: 11, lineHeight: 17, marginTop: 4 },
            changeHistoryMeta: { color: colors.muted, fontSize: 9, marginTop: 7 },
            changeHistoryNewDate: { color: colors.primaryDark, fontWeight: '800', fontSize: 10, marginTop: 5 },"""
          clients = replace_once(clients, style_anchor, style_replacement, 'client history styles')
          clients_path.write_text(clients)
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build web
        run: npm run build:web

      - name: Commit validated source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types.ts src/screens/AgendaScreen.tsx src/screens/ClientsScreen.tsx
          git commit -m "Add appointment change reasons and client history"
          git push
