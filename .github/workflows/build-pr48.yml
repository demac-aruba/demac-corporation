name: Build PR 48 technician write fix

on:
  push:
    branches:
      - feature/technician-firestore-write-fix
    paths:
      - .github/pr48-trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/technician-firestore-write-fix
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply functional changes
        run: python3 .github/apply-pr48.py
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build web
        run: npm run build:web
      - name: Commit functional changes
        run: |
          rm -f .github/workflows/build-pr48.yml .github/apply-pr48.py .github/pr48-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix technician work order updates and local photo capture"
          git push origin HEAD:feature/technician-firestore-write-fix
