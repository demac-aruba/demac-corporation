name: Apply clean half-day integration

on:
  push:
    branches:
      - agent/half-days-clean-aug1

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: agent/half-days-clean-aug1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply direct source changes
        run: node scripts/apply-half-days-clean.cjs

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build web application
        run: npm run build:web

      - name: Remove one-time migration files
        run: |
          rm -rf dist
          rm -f scripts/apply-half-days-clean.cjs
          rm -f .github/workflows/apply-half-days-clean.yml

      - name: Commit validated TypeScript changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate van half-days into classic agenda from August 1"
          git push origin HEAD:agent/half-days-clean-aug1
