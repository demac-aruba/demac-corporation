name: Apply regular schedule fix

on:
  push:
    branches:
      - agent/regular-schedule-half-day

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[skip regular schedule patch]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/regular-schedule-half-day
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply payroll schedule patch
        run: python scripts/apply_regular_schedule_fix.py
      - name: Commit corrected schedule
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hooks/usePayrollModule.ts src/screens/EmployeesTimesheetScreen.tsx
          git diff --cached --quiet || git commit -m "[skip regular schedule patch] Use one regular schedule Monday through Saturday"
          git push
