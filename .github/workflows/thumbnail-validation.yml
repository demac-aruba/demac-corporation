name: Thumbnail validation

on:
  push:
    branches:
      - agent/inventory-safe-thumbnail-v2
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --silent
      - name: Typecheck with concise error output
        shell: bash
        run: |
          set +e
          npm run typecheck > /tmp/typecheck.log 2>&1
          status=$?
          tail -n 60 /tmp/typecheck.log
          exit $status
