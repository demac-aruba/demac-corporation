name: Thumbnail validation

on:
  push:
    branches:
      - agent/inventory-safe-thumbnail-v2
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      typecheck_log: ${{ steps.typecheck.outputs.log }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --silent
      - name: Capture typecheck result
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > /tmp/typecheck.log 2>&1
          status=$?
          {
            echo 'log<<TYPECHECK_EOF'
            tail -n 40 /tmp/typecheck.log
            echo 'TYPECHECK_EOF'
          } >> "$GITHUB_OUTPUT"
          exit $status

  report:
    if: always()
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Print captured typecheck output
        env:
          TYPECHECK_LOG: ${{ needs.validate.outputs.typecheck_log }}
        run: printf '%s\n' "$TYPECHECK_LOG"
