name: Fix existing agenda appointments

on:
  push:
    branches:
      - fix/preserve-existing-agenda-appointments
    paths:
      - .github/scripts/fix_existing_agenda_appointments.py
      - .github/workflows/fix-existing-agenda-appointments.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/preserve-existing-agenda-appointments
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply compatibility fix
        run: python .github/scripts/fix_existing_agenda_appointments.py
      - name: Commit agenda fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/AgendaScreen.tsx
          git diff --cached --quiet || git commit -m "Preserve existing appointments after van migration"
          git push
