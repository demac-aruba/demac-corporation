name: Validate calendar closures

on:
  push:
    branches:
      - feature/calendar-closures-settings
    paths:
      - .github/workflows/integrate-calendar-with-agenda.yml
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/calendar-closures-settings
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build:web
