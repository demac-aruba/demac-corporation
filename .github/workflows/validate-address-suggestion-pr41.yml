name: Validate PR 41 address suggestions

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    if: github.head_ref == 'fix/address-suggestion-selection'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/address-suggestion-selection
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply fixes
        run: python3 scripts/apply_address_suggestion_fix.py
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build:web
      - name: Commit functional changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/utils/location.ts src/screens/ClientsScreen.tsx
          git commit -m "Fix address suggestion ranking and selection"
          git push origin HEAD:fix/address-suggestion-selection
