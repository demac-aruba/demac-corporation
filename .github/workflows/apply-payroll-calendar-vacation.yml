name: Apply payroll calendar and vacation patch

on:
  push:
    branches:
      - agent/payroll-calendar-vacation-4333

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[skip payroll patch]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/payroll-calendar-vacation-4333
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply payroll patch
        run: python scripts/apply_payroll_calendar_vacation_patch.py
      - name: Commit patched screen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/EmployeesTimesheetScreen.tsx
          git diff --cached --quiet || git commit -m "[skip payroll patch] Add calendar, vacation and 4.333 payroll UI"
          git push
