name: Validate PR 37 client language and phones

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-pr37:
    if: github.head_ref == 'feature/client-language-international-phone'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/client-language-international-phone
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Extract and apply PR 37 patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/apply-client-language-phone.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(source) if "cat > /tmp/patch_pr37.py <<'PY'" in line) + 1
          end = next(i for i in range(start, len(source)) if source[i].strip() == 'PY')
          lines = source[start:end]
          prefix = '          '
          cleaned = [line[len(prefix):] if line.startswith(prefix) else line for line in lines]
          Path('/tmp/patch_pr37.py').write_text('\n'.join(cleaned) + '\n', encoding='utf-8')
          PY
          set +e
          python3 /tmp/patch_pr37.py > /tmp/pr37-patch.log 2>&1
          status=$?
          set -e
          cat /tmp/pr37-patch.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/pr37-patch.log .github/pr37-patch-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/pr37-patch-error.txt
            git commit -m "Capture PR 37 patch error" || true
            git push origin HEAD:feature/client-language-international-phone
            exit "$status"
          fi
      - name: Install dependencies
        run: npm install libphonenumber-js
      - name: Typecheck
        run: npm run typecheck
      - name: Build web
        run: npm run build:web
      - name: Commit validated source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src/types.ts src/state/AppState.tsx src/screens/ClientsScreen.tsx src/screens/AgendaScreen.tsx src/components/PhoneField.tsx src/utils/phone.ts
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "Add client language and international phone support"
          git push origin HEAD:feature/client-language-international-phone
