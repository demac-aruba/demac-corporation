name: Apply payroll summary PDF patch

on:
  push:
    branches:
      - agent/payroll-summary-pdf

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/applyPayrollPdfPatch.cjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/EmployeesTimesheetScreen.tsx
          git commit -m "Add printable payroll PDF summary" || exit 0
          git push
