name: Validate appointment change history

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-validate-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/appointment-change-history
          fetch-depth: 0

      - name: Apply source patch
        shell: bash
        run: |
          set +e
          python3 - <<'PY' > /tmp/appointment-history-patch.log 2>&1
          from pathlib import Path

          workflow = Path('.github/workflows/apply-appointment-change-history.yml').read_text()
          marker = "          python3 - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          source = workflow[start:end]
          source = '\n'.join(line[10:] if line.startswith('          ') else line for line in source.splitlines())

          strict_helper = """def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f'{label} not found')
              return text.replace(old, new, 1)"""
          tolerant_helper = """def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old in text:
                  return text.replace(old, new, 1)
              import re
              tokens = [token for token in re.split(r'\\s+', old.strip()) if token]
              pattern = r'\\s+'.join(re.escape(token) for token in tokens)
              match = re.search(pattern, text, flags=re.DOTALL)
              if not match:
                  raise SystemExit(f'{label} not found')
              return text[:match.start()] + new + text[match.end():]"""
          if strict_helper not in source:
              raise SystemExit('replace_once helper not found in patch source')
          source = source.replace(strict_helper, tolerant_helper, 1)
          exec(compile(source, 'appointment_change_patch.py', 'exec'))
          PY
          status=$?
          cat /tmp/appointment-history-patch.log
          if [ $status -ne 0 ]; then
            cp /tmp/appointment-history-patch.log .github/appointment-change-patch-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/appointment-change-patch-error.txt
            git commit -m "Capture appointment history patch error"
            git push
            exit $status
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > /tmp/appointment-history-typecheck.log 2>&1
          status=$?
          cat /tmp/appointment-history-typecheck.log
          if [ $status -ne 0 ]; then
            cp /tmp/appointment-history-typecheck.log .github/appointment-change-typecheck-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/appointment-change-typecheck-error.txt
            git commit -m "Capture appointment history typecheck error"
            git push
            exit $status
          fi

      - name: Build web
        run: npm run build:web

      - name: Commit validated source
        shell: bash
        run: |
          rm -f .github/appointment-change-patch-error.txt .github/appointment-change-typecheck-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A src/types.ts src/screens/AgendaScreen.tsx src/screens/ClientsScreen.tsx .github/appointment-change-patch-error.txt .github/appointment-change-typecheck-error.txt
          git commit -m "Add appointment change reasons and client history"
          git push
