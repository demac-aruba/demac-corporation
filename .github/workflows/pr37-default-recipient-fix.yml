name: Apply and validate PR 37 recipient defaults

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    if: github.head_ref == 'trigger/pr37-recipient-default-fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/client-language-international-phone
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Preserve property contact notification defaults
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/screens/AgendaScreen.tsx')
          text = path.read_text(encoding='utf-8')
          old = """      sendConfirmation: index === 0 ? legacyEnabled : false,
      sendReminder: index === 0 ? legacyEnabled : false,"""
          new = """      sendConfirmation: index === 0 ? legacyEnabled : recipient.sendConfirmation,
      sendReminder: index === 0 ? legacyEnabled : recipient.sendReminder,"""
          if old in text:
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          elif new not in text:
              raise SystemExit('notification default block not found')
          PY
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build:web
      - name: Commit validated correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/AgendaScreen.tsx
          if git diff --cached --quiet; then
            echo "Correction already applied."
            exit 0
          fi
          git commit -m "Preserve property contact notification defaults"
          git push origin HEAD:feature/client-language-international-phone
