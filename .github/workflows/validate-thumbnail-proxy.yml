name: Validate thumbnail proxy

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: Typecheck
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload typecheck log
        uses: actions/upload-artifact@v4
        with:
          name: thumbnail-proxy-typecheck
          path: typecheck.log
      - name: Fail when typecheck failed
        if: steps.typecheck.outputs.status != '0'
        run: exit 1
      - name: Build web
        shell: bash
        run: npm run build:web
