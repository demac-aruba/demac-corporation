name: Validate thumbnail proxy

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: Typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          status=$?
          tail -n 120 typecheck.log
          exit $status
      - name: Build web
        shell: bash
        run: |
          set +e
          npm run build:web > build.log 2>&1
          status=$?
          tail -n 120 build.log
          exit $status
