name: Apply and validate agenda booking states

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/agenda-booking-states'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: feature/agenda-booking-states
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply source changes when pending
        run: |
          if [ -f scripts/apply-agenda-booking-states.py ]; then
            python3 scripts/apply-agenda-booking-states.py
          else
            echo "Source migration already applied."
          fi

      - name: Install dependencies
        run: npm ci

      - name: Capture validation diagnostics
        run: |
          set +e
          npm run typecheck > booking-state-validation.txt 2>&1
          TYPECHECK_EXIT=$?
          npm run build:web >> booking-state-validation.txt 2>&1
          BUILD_EXIT=$?
          node --check functions/appointmentNotifications.js >> booking-state-validation.txt 2>&1
          NODE_EXIT=$?
          printf "\nTYPECHECK_EXIT=%s\nBUILD_EXIT=%s\nNODE_EXIT=%s\n" "$TYPECHECK_EXIT" "$BUILD_EXIT" "$NODE_EXIT" >> booking-state-validation.txt
          cat booking-state-validation.txt
          exit 0

      - name: Remove temporary migration script
        run: |
          rm -rf dist
          rm -f scripts/apply-agenda-booking-states.py

      - name: Commit generated source and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
          else
            git commit -m "Apply agenda booking states for validation"
            git push origin HEAD:feature/agenda-booking-states
          fi
