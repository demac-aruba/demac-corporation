name: Apply and validate agenda booking states

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/agenda-booking-states'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: feature/agenda-booking-states
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply source changes when pending
        run: |
          if [ -f scripts/apply-agenda-booking-states.py ]; then
            python3 scripts/apply-agenda-booking-states.py
          else
            echo "Source migration already applied."
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate TypeScript
        run: npm run typecheck

      - name: Validate web build
        run: npm run build:web

      - name: Validate notification function syntax
        run: node --check functions/appointmentNotifications.js

      - name: Remove temporary migration script
        run: |
          rm -rf dist
          rm -f scripts/apply-agenda-booking-states.py

      - name: Commit validated source when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
          else
            git commit -m "Add temporary reservations and cancellation history to agenda"
            git push origin HEAD:feature/agenda-booking-states
          fi
