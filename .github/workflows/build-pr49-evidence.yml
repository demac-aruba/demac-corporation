name: Build PR 49 evidence storage

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/pr49-trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply functional changes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/apply-pr49.py')
          text = path.read_text()
          duplicate = "replace('src/state/AppState.tsx', '    workOrders,\\n    inventory,', '    workOrders,\\n    workOrderEvidence,\\n    inventory,', 1)\n"
          path.write_text(text.replace(duplicate, ''))
          PY
          python3 .github/apply-pr49.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/state/AppState.tsx')
          text = path.read_text()
          text = text.replace(
            "          if (Array.isArray(parsed.workOrders)) setWorkOrders(parsed.workOrders);\n",
            "          if (Array.isArray(parsed.workOrders)) setWorkOrders(parsed.workOrders);\n          if (Array.isArray(parsed.workOrderEvidence)) setWorkOrderEvidence(parsed.workOrderEvidence);\n",
          )
          text = text.replace(
            "    const state: PersistedState = { clients, properties, services, workOrders, inventory, invoices };",
            "    const state: PersistedState = { clients, properties, services, workOrders, workOrderEvidence, inventory, invoices };",
          )
          path.write_text(text)
          PY
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build web
        run: npm run build:web
      - name: Commit functional changes
        run: |
          rm -f .github/workflows/build-pr49.yml .github/apply-pr49.py .github/pr49-trigger pr49-patch-output.txt pr49-typecheck-output.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add permanent Firebase Storage work order evidence"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
