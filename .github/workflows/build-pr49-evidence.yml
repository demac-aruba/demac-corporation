name: Build PR 49 evidence storage

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/pr49-trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply functional changes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/apply-pr49.py')
          text = path.read_text()
          duplicate = "replace('src/state/AppState.tsx', '    workOrders,\\n    inventory,', '    workOrders,\\n    workOrderEvidence,\\n    inventory,', 1)\n"
          path.write_text(text.replace(duplicate, ''))
          PY
          set +e
          python3 .github/apply-pr49.py > pr49-patch-output.txt 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pr49-patch-output.txt
            git commit -m "Capture PR49 patch diagnostic" || true
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
            exit "$status"
          fi
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build web
        run: npm run build:web
      - name: Commit functional changes
        run: |
          rm -f .github/workflows/build-pr49.yml .github/apply-pr49.py .github/pr49-trigger pr49-patch-output.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add permanent Firebase Storage work order evidence"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
