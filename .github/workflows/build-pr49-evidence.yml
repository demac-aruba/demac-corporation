name: Build PR 49 evidence storage

on:
  push:
    branches:
      - feature/firebase-storage-evidence
    paths:
      - .github/pr49-trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/firebase-storage-evidence
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply functional changes
        run: python3 .github/apply-pr49.py
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build web
        run: npm run build:web
      - name: Commit functional changes
        run: |
          rm -f .github/workflows/build-pr49.yml .github/apply-pr49.py .github/pr49-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add permanent Firebase Storage work order evidence"
          git push origin HEAD:feature/firebase-storage-evidence
