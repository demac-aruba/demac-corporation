name: Validate thumbnail server

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm run typecheck
      - name: Build web and show final error
        shell: bash
        run: |
          set +e
          npm run build:web > build.log 2>&1
          status=$?
          tail -n 100 build.log
          exit $status
