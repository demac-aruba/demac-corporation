name: Consolidate inventory source

on:
  push:
    branches: [agent/inventory-thumbnail-cleanup]

permissions:
  contents: write

jobs:
  consolidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/inventory-thumbnail-cleanup
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: Apply final inventory state once
        run: npm run patch:inventory
      - name: Remove obsolete inventory patch code
        run: node scripts/consolidateInventorySource.cjs
      - name: Verify dead code is gone
        shell: bash
        run: |
          ! grep -R "uploadInventoryThumbnail\|optimizeExistingThumbnails\|inventoryThumbnailStorage" src package.json scripts --exclude-dir=node_modules
          test ! -f src/services/inventoryThumbnailStorage.ts
          test ! -f scripts/runInventoryUnitPatch.cjs
      - name: Typecheck clean source
        run: npm run typecheck
      - name: Build clean web source
        run: npm run build:web
      - name: Commit consolidated source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Consolidate inventory source and remove obsolete thumbnail code"
          git push origin HEAD:agent/inventory-thumbnail-cleanup
