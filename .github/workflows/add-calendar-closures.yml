name: Add calendar closures and blocked days

on:
  push:
    branches:
      - feature/calendar-closures-settings
    paths:
      - .github/scripts/add_calendar_closures.py
      - .github/workflows/add-calendar-closures.yml

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/calendar-closures-settings
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: python .github/scripts/add_calendar_closures.py
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build:web
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add App.tsx firestore.rules src/types.ts src/state/CalendarState.tsx src/screens/SettingsScreen.tsx src/screens/AgendaScreen.tsx
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "Add calendar closures and blocked scheduling days"
            git push origin HEAD:feature/calendar-closures-settings
          fi
