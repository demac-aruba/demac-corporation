name: Apply half-day agenda integration

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply direct source changes
        run: node scripts/patch-agenda-half-days-aug1.cjs

      - name: Install dependencies
        run: npm ci

      - name: Type-check application
        run: npm run typecheck

      - name: Remove one-time patch files
        run: |
          rm -f scripts/patch-agenda-half-days-aug1.cjs
          rm -f .github/workflows/apply-half-days-aug1.yml

      - name: Commit checked-in source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Enable van half-days from August 1 in classic agenda"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
