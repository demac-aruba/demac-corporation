name: Run quick properties and contacts validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-validate-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/quick-properties-contacts
          fetch-depth: 0

      - name: Apply source patch
        shell: bash
        run: |
          set +e
          python3 - <<'PY' > /tmp/quick-properties-contacts-patch.log 2>&1
          from pathlib import Path

          workflow = Path('.github/workflows/apply-quick-properties-contacts.yml').read_text()
          marker = "          python3 - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          source = workflow[start:end]
          source = '\n'.join(line[10:] if line.startswith('          ') else line for line in source.splitlines())
          exec(compile(source, 'quick_properties_contacts_patch.py', 'exec'))
          PY
          status=$?
          cat /tmp/quick-properties-contacts-patch.log
          if [ $status -ne 0 ]; then
            cp /tmp/quick-properties-contacts-patch.log .github/quick-properties-contacts-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/quick-properties-contacts-error.txt
            git commit -m "Capture quick properties and contacts patch error"
            git push
            exit $status
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > /tmp/quick-properties-contacts-typecheck.log 2>&1
          status=$?
          cat /tmp/quick-properties-contacts-typecheck.log
          if [ $status -ne 0 ]; then
            cp /tmp/quick-properties-contacts-typecheck.log .github/quick-properties-contacts-typecheck-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/quick-properties-contacts-typecheck-error.txt
            git commit -m "Capture quick properties and contacts typecheck error"
            git push
            exit $status
          fi

      - name: Build web
        run: npm run build:web

      - name: Commit validated source
        shell: bash
        run: |
          rm -f .github/quick-properties-contacts-error.txt .github/quick-properties-contacts-typecheck-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A src/types.ts src/state/AppState.tsx src/screens/AgendaScreen.tsx src/screens/ClientsScreen.tsx .github/quick-properties-contacts-error.txt .github/quick-properties-contacts-typecheck-error.txt
          git commit -m "Add quick properties and property contacts"
          git push
