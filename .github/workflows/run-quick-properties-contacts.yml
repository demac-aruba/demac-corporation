name: Run quick properties and contacts validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-validate-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/quick-properties-contacts
          fetch-depth: 0

      - name: Apply source patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-quick-properties-contacts.yml').read_text()
          marker = "          python3 - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          source = workflow[start:end]
          source = '\n'.join(line[10:] if line.startswith('          ') else line for line in source.splitlines())
          exec(compile(source, 'quick_properties_contacts_patch.py', 'exec'))
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build web
        run: npm run build:web

      - name: Commit validated source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types.ts src/state/AppState.tsx src/screens/AgendaScreen.tsx src/screens/ClientsScreen.tsx
          git commit -m "Add quick properties and property contacts"
          git push
