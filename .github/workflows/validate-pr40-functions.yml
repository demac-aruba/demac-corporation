name: Validate PR 40 Functions

on:
  pull_request:
    branches: [main]

jobs:
  node-check:
    if: github.head_ref == 'feature/aruba-location-directory'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/aruba-location-directory
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --check functions/index.js
