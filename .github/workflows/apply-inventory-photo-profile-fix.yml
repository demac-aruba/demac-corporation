name: Apply inventory profile fix

on:
  push:
    branches:
      - agent/inventory-tool-profile-controls
    paths:
      - scripts/apply-inventory-photo-profile-fix.mjs
      - .github/workflows/apply-inventory-photo-profile-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/inventory-tool-profile-controls
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply source patch
        run: node scripts/apply-inventory-photo-profile-fix.mjs
      - name: Commit patched source
        run: |
          git config user.name "demac-inventory-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/screens/InventoryScreenV4.tsx scripts/apply-inventory-photo-profile-fix.mjs .github/workflows/apply-inventory-photo-profile-fix.yml
          git commit -m "Improve inventory tool profile interactions"
          git push origin HEAD:agent/inventory-tool-profile-controls
