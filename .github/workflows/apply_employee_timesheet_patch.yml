name: Apply employee timesheet integration

on:
  push:
    branches:
      - agent/employee-timesheet-payroll

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[skip employee patch]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/employee-timesheet-payroll
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply integration patch
        run: python scripts/apply_employee_timesheet_patch.py
      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types.ts src/components/AppShell.tsx firestore.rules
          git diff --cached --quiet || git commit -m "[skip employee patch] Integrate employee timesheet module"
          git push
