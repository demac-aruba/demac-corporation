name: Apply quick properties and contacts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wrapper:
    runs-on: ubuntu-latest
    steps:
      - name: Apply original patch with tolerant matching
        shell: bash
        run: |
          python3 - <<'PY'
          import subprocess

          original = subprocess.check_output([
              'git',
              'show',
              'da7118f2aea67fdc31f84bf6f85ecd0670ddd504:.github/workflows/apply-quick-properties-contacts.yml',
          ], text=True)
          marker = "          python3 - <<'PY'\n"
          start = original.index(marker) + len(marker)
          end = original.index("\n          PY", start)
          source = original[start:end]
          source = '\n'.join(line[10:] if line.startswith('          ') else line for line in source.splitlines())

          strict_helper = """def replace_once(text: str, old: str, new: str, label: str) -> str:
    if old not in text:
        raise SystemExit(f'{label} not found')
    return text.replace(old, new, 1)"""
          tolerant_helper = """def replace_once(text: str, old: str, new: str, label: str) -> str:
    if old in text:
        return text.replace(old, new, 1)
    import re
    tokens = [token for token in re.split(r'\\s+', old.strip()) if token]
    pattern = r'\\s+'.join(re.escape(token) for token in tokens)
    match = re.search(pattern, text, flags=re.DOTALL)
    if not match:
        raise SystemExit(f'{label} not found')
    return text[:match.start()] + new + text[match.end():]"""
          if strict_helper not in source:
              raise SystemExit('replace_once helper not found in original patch')
          source = source.replace(strict_helper, tolerant_helper, 1)
          exec(compile(source, 'quick_properties_contacts_patch.py', 'exec'))
          PY
