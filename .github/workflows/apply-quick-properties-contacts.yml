name: Diagnose appointment notification recipient matrix

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Run original patch with diagnostics
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import subprocess
          import traceback

          original = subprocess.check_output([
              'git',
              'show',
              '058085daa98e77f2398a00470c01162a8a053d9a:.github/workflows/apply-quick-properties-contacts.yml',
          ], text=True)
          marker = "          python3 - <<'PY'\n"
          start = original.index(marker) + len(marker)
          end = original.index("\n          PY", start)
          source = original[start:end]
          source = '\n'.join(line[10:] if line.startswith('          ') else line for line in source.splitlines())

          try:
              exec(compile(source, 'appointment_notification_recipient_patch.py', 'exec'))
          except BaseException as error:
              diagnostic = ''.join(traceback.format_exception(type(error), error, error.__traceback__))
              Path('.github/appointment-notification-patch-error.txt').write_text(diagnostic)
              subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'], check=True)
              subprocess.run(['git', 'config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com'], check=True)
              subprocess.run(['git', 'add', '.github/appointment-notification-patch-error.txt'], check=True)
              subprocess.run(['git', 'commit', '-m', 'Capture appointment notification patch error'], check=True)
              subprocess.run(['git', 'push'], check=True)
              raise
          PY