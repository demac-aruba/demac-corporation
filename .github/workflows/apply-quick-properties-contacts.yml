name: Apply appointment notification recipient matrix

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Run original patch with tolerant notification replacement
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import subprocess

          original = subprocess.check_output([
              'git',
              'show',
              '058085daa98e77f2398a00470c01162a8a053d9a:.github/workflows/apply-quick-properties-contacts.yml',
          ], text=True)
          marker = "          python3 - <<'PY'\n"
          start = original.index(marker) + len(marker)
          end = original.index("\n          PY", start)
          source = original[start:end]
          source = '\n'.join(line[10:] if line.startswith('          ') else line for line in source.splitlines())

          strict_call = "text = replace_once(text, old_notifications, new_notifications, 'notification recipient matrix')"
          tolerant_call = """if old_notifications in text:
    text = text.replace(old_notifications, new_notifications, 1)
else:
    start_marker = '<Text style={styles.fieldLabel}>Notificaciones al confirmar</Text>'
    marker_index = text.find(start_marker)
    if marker_index < 0:
        raise SystemExit('notification recipient matrix start not found')
    line_start = text.rfind('\\n', 0, marker_index) + 1
    block_end = text.find('</View>', marker_index)
    if block_end < 0:
        raise SystemExit('notification recipient matrix end not found')
    block_end += len('</View>')
    text = text[:line_start] + new_notifications + text[block_end:]"""
          if strict_call not in source:
              raise SystemExit('notification replacement call not found in original patch')
          source = source.replace(strict_call, tolerant_call, 1)
          exec(compile(source, 'appointment_notification_recipient_patch.py', 'exec'))
          PY