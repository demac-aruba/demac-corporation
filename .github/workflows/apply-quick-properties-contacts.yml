name: Clean quick properties validation files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Remove temporary files
        shell: bash
        run: |
          python3 - <<'PY'
          import subprocess
          from pathlib import Path

          paths = [
              '.github/quick-properties-contacts-trigger.txt',
              '.github/quick-properties-contacts-trigger-2.txt',
              '.github/quick-properties-contacts-trigger-3.txt',
              '.github/quick-properties-contacts-error.txt',
              '.github/quick-properties-contacts-typecheck-error.txt',
              '.github/workflows/apply-quick-properties-contacts.yml',
              '.github/workflows/run-quick-properties-contacts.yml',
          ]
          existing = [path for path in paths if Path(path).exists()]
          subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'], check=True)
          subprocess.run(['git', 'config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com'], check=True)
          if existing:
              subprocess.run(['git', 'rm', '-f', *existing], check=True)
              subprocess.run(['git', 'commit', '-m', 'Remove temporary quick property validation files'], check=True)
              subprocess.run(['git', 'push'], check=True)
          PY
