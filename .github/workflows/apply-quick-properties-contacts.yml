name: Validate quick properties and contacts

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-validate-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/quick-properties-contacts
          fetch-depth: 0

      - name: Apply source patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f'{label} not found')
              return text.replace(old, new, 1)

          # --- Types ---
          path = Path('src/types.ts')
          text = path.read_text()
          text = replace_once(
              text,
              "export type PropertyType = 'Casa' | 'Apartamento' | 'Oficina' | 'Local comercial' | 'Otro';\n\nexport interface Property {",
              """export type PropertyType = 'Casa' | 'Apartamento' | 'Oficina' | 'Local comercial' | 'Otro';

export type PropertyContactRole = 'Dueño' | 'Encargado' | 'Administrador' | 'Inquilino' | 'Contacto de acceso' | 'Contabilidad' | 'Otro';
export type PropertyContactLanguage = 'Español' | 'English' | 'Nederlands' | 'Papiamento';

export interface PropertyContact {
  id: string;
  name: string;
  role: PropertyContactRole;
  phone: string;
  whatsapp: string;
  email?: string;
  preferredLanguage: PropertyContactLanguage;
  active: boolean;
  createdAt?: string;
  updatedAt?: string;
}

export interface Property {""",
              'property contact types',
          )
          text = replace_once(
              text,
              "  notes?: string;\n  active: boolean;",
              "  notes?: string;\n  contacts?: PropertyContact[];\n  active: boolean;",
              'property contacts field',
          )
          path.write_text(text)

          # --- App state ---
          path = Path('src/state/AppState.tsx')
          text = path.read_text()
          text = replace_once(
              text,
              "  addProperty: (property: Property) => Promise<OperationResult>;\n  removeProperty: (id: string) => Promise<OperationResult>;",
              "  addProperty: (property: Property) => Promise<OperationResult>;\n  updateProperty: (id: string, changes: Partial<Property>) => Promise<OperationResult>;\n  removeProperty: (id: string) => Promise<OperationResult>;",
              'app state property contract',
          )
          marker = "\n  const removeProperty = async (id: string): Promise<OperationResult> => {"
          insert = """

  const updateProperty = async (id: string, changes: Partial<Property>): Promise<OperationResult> => {
    const existing = properties.find((property) => property.id === id);
    if (!existing) return { ok: false, message: 'La propiedad ya no existe.' };
    const updated: Property = { ...existing, ...changes, updatedAt: changes.updatedAt ?? new Date().toISOString() };
    if (currentUser?.authProvider !== 'firebase') {
      setProperties((previous) => sortProperties(previous.map((property) => property.id === id ? updated : property)));
      return { ok: true };
    }
    try {
      await saveFirestoreDocument('properties', updated);
      setProperties((previous) => sortProperties(previous.map((property) => property.id === id ? updated : property)));
      setDataError(null);
      setLastSyncedAt(new Date().toISOString());
      return { ok: true };
    } catch (error) {
      const message = friendlyDataError(error);
      setDataError(message);
      return { ok: false, message };
    }
  };
"""
          if marker not in text:
              raise SystemExit('update property insertion marker not found')
          text = text.replace(marker, insert + marker, 1)
          text = replace_once(
              text,
              "    addProperty,\n    removeProperty,",
              "    addProperty,\n    updateProperty,\n    removeProperty,",
              'app state value property actions',
          )
          path.write_text(text)

          # --- Agenda ---
          path = Path('src/screens/AgendaScreen.tsx')
          text = path.read_text()
          text = replace_once(
              text,
              "import { AppointmentChangeOrigin, AppointmentChangeReasonCategory, AppointmentStatus, Client, DailyVanAssignment, Property, PropertyType, ServiceType, StaffAbsence, StaffProfile, Van, WorkOrder, WorkOrderScheduleHistoryEntry } from '../types';",
              "import { AppointmentChangeOrigin, AppointmentChangeReasonCategory, AppointmentStatus, Client, DailyVanAssignment, Property, PropertyContact, PropertyContactLanguage, PropertyContactRole, PropertyType, ServiceType, StaffAbsence, StaffProfile, Van, WorkOrder, WorkOrderScheduleHistoryEntry } from '../types';",
              'agenda imports',
          )
          text = replace_once(
              text,
              "const propertyTypes: PropertyType[] = ['Casa', 'Apartamento', 'Oficina', 'Local comercial', 'Otro'];",
              "const propertyTypes: PropertyType[] = ['Casa', 'Apartamento', 'Oficina', 'Local comercial', 'Otro'];\nconst propertyContactRoles: PropertyContactRole[] = ['Dueño', 'Encargado', 'Administrador', 'Inquilino', 'Contacto de acceso', 'Contabilidad', 'Otro'];\nconst propertyContactLanguages: PropertyContactLanguage[] = ['Español', 'English', 'Nederlands', 'Papiamento'];",
              'agenda contact constants',
          )
          text = replace_once(
              text,
              "const emptyQuickClientForm: QuickClientForm = {\n  name: '',\n  company: '',\n  phone: '',\n  whatsapp: '',\n  propertyName: 'Propiedad principal',\n  propertyType: 'Casa',\n  address: '',\n  zone: '',\n};",
              """const emptyQuickClientForm: QuickClientForm = {
  name: '',
  company: '',
  phone: '',
  whatsapp: '',
  propertyName: 'Propiedad principal',
  propertyType: 'Casa',
  address: '',
  zone: '',
};

type QuickPropertyForm = {
  name: string;
  type: PropertyType;
  address: string;
  zone: string;
  notes: string;
};

const emptyQuickPropertyForm: QuickPropertyForm = {
  name: '',
  type: 'Casa',
  address: '',
  zone: '',
  notes: '',
};

type QuickContactForm = {
  name: string;
  role: PropertyContactRole;
  phone: string;
  whatsapp: string;
  email: string;
  preferredLanguage: PropertyContactLanguage;
};

const emptyQuickContactForm: QuickContactForm = {
  name: '',
  role: 'Encargado',
  phone: '',
  whatsapp: '',
  email: '',
  preferredLanguage: 'Español',
};""",
              'agenda quick form types',
          )
          text = replace_once(
              text,
              "    addClient,\n    addProperty,\n    addWorkOrder,",
              "    addClient,\n    addProperty,\n    updateProperty,\n    addWorkOrder,",
              'agenda property actions',
          )
          text = replace_once(
              text,
              "  const [quickClientMessage, setQuickClientMessage] = useState('');\n  const [successMessage, setSuccessMessage] = useState('');",
              """  const [quickClientMessage, setQuickClientMessage] = useState('');
  const [showQuickProperty, setShowQuickProperty] = useState(false);
  const [quickProperty, setQuickProperty] = useState<QuickPropertyForm>(emptyQuickPropertyForm);
  const [quickPropertySaving, setQuickPropertySaving] = useState(false);
  const [quickPropertyMessage, setQuickPropertyMessage] = useState('');
  const [showQuickContact, setShowQuickContact] = useState(false);
  const [quickContact, setQuickContact] = useState<QuickContactForm>(emptyQuickContactForm);
  const [quickContactSaving, setQuickContactSaving] = useState(false);
  const [quickContactMessage, setQuickContactMessage] = useState('');
  const [successMessage, setSuccessMessage] = useState('');""",
              'agenda quick form state',
          )
          text = replace_once(
              text,
