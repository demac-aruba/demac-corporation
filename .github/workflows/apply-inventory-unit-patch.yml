name: Apply inventory per-unit patch

on:
  push:
    branches:
      - agent/inventory-per-unit-photos-conditions

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[skip inventory patch]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/inventory-per-unit-photos-conditions
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply source patch
        run: python scripts/apply_inventory_unit_patch.py
      - name: Commit patched source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/InventoryScreenV4.tsx src/hooks/useInventoryModuleV2.ts
          git diff --cached --quiet || git commit -m "[skip inventory patch] Add per-unit photos and conditions"
          git push
