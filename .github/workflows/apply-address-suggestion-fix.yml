name: Apply and validate address suggestion fix

on:
  push:
    branches: [fix/address-suggestion-selection]

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/address-suggestion-selection
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply suggestion fixes
        run: python3 scripts/apply_address_suggestion_fix.py
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build web
        run: npm run build:web
      - name: Commit validated source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f scripts/apply_address_suggestion_fix.py
          rm -f .github/workflows/apply-address-suggestion-fix.yml
          git add -A
          git commit -m "Fix address suggestion ranking and selection"
          git push origin HEAD:fix/address-suggestion-selection
