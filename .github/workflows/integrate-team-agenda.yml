name: Integrate real team data into agenda

on:
  push:
    branches:
      - fix/agenda-team-integration
    paths:
      - .github/scripts/integrate_team_agenda.py
      - .github/workflows/integrate-team-agenda.yml
      - .github/team-agenda-trigger.txt

permissions:
  contents: write

jobs:
  apply-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/agenda-team-integration
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply agenda integration
        run: python .github/scripts/integrate_team_agenda.py
      - name: Commit agenda integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/AgendaScreen.tsx
          git diff --cached --quiet || git commit -m "Connect agenda to real vans and daily team assignments"
          git push
